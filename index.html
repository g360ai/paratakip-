<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07090f">
<title>Para Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#07090f;--s1:#0d1120;--s2:#131929;--s3:#1a2238;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e4e8f0;--muted:#5a6680;--muted2:#8090b0;--gold:#e8a020;--gold2:#ffd060;--green:#00c896;--red:#f04060;--blue:#4080ff;--r:10px;--r2:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:var(--gold2)}.logo span{color:var(--muted2);font-weight:400}
.header-actions{display:flex;gap:8px;align-items:center}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.icon-btn{background:var(--s3);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
.icon-btn:hover{background:var(--border2)}
main{max-width:900px;margin:0 auto;padding:1.25rem}

/* TAB BAR */
.tab-bar{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:2px solid var(--border)}
.tab-btn{background:transparent;border:none;color:var(--muted2);padding:10px 18px;font-size:.82rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;position:relative;transition:all .2s;letter-spacing:.02em}
.tab-btn::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:transparent;transition:all .2s}
.tab-btn.active{color:var(--gold2)}
.tab-btn.active::after{background:var(--gold)}
.tab-btn:hover{color:var(--text)}
.tab-btn .tab-icon{margin-right:5px}

.period-bar{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.period-bar::-webkit-scrollbar{display:none}
.period-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:6px 14px;border-radius:40px;font-size:.78rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.period-btn.active{background:var(--gold);border-color:var(--gold);color:#0a0600}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r2) var(--r2) 0 0}
.card.c-gold::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}.card.c-green::before{background:var(--green)}.card.c-red::before{background:var(--red)}.card.c-blue::before{background:var(--blue)}
.card-label{font-size:.7rem;color:var(--muted2);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem}
.card-value{font-family:'DM Mono',monospace;font-size:1.25rem;font-weight:500;line-height:1}
.card-value.positive{color:var(--green)}.card-value.negative{color:var(--red)}.card-value.neutral{color:var(--gold2)}
.card-sub{font-size:.68rem;color:var(--muted);margin-top:.35rem}
.charts{display:grid;grid-template-columns:1fr 1.6fr;gap:10px;margin-bottom:1.25rem}
@media(max-width:600px){.charts{grid-template-columns:1fr}}
.chart-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:1rem}
.chart-title{font-size:.75rem;color:var(--muted2);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.9rem}
.chart-wrap{position:relative;height:180px}
.cat-legend{display:flex;flex-direction:column;gap:5px;margin-top:.6rem;max-height:120px;overflow-y:auto;scrollbar-width:thin}
.cat-legend-row{display:flex;align-items:center;gap:7px;font-size:.75rem}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-amt{font-family:'DM Mono',monospace;color:var(--muted2);font-size:.72rem}

/* ANALYSIS VIEW */
.analysis-view{display:none;margin-bottom:1rem}
.analysis-view.show{display:block}
.analysis-controls{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.analysis-controls .group-label{font-size:.72rem;color:var(--muted);font-weight:600;margin-right:2px}
.analysis-pill{background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:5px 12px;border-radius:40px;font-size:.72rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.analysis-pill.active{background:var(--gold);border-color:var(--gold);color:#0a0600}
.analysis-chart-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;margin-bottom:10px}
.analysis-chart-wrap{position:relative;height:260px}
@media(max-width:600px){.analysis-chart-wrap{height:220px}}
.analysis-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem}
.analysis-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:.75rem .9rem}
.analysis-stat-label{font-size:.65rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem}
.analysis-stat-val{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:var(--text)}

/* INVEST VIEW */
.invest-view{display:none;margin-bottom:1rem}
.invest-view.show{display:block}
.invest-stats{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.invest-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:.9rem 1.1rem;flex:1;min-width:110px}
.invest-stat-label{font-size:.68rem;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.invest-stat-val{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500}
.invest-list{display:flex;flex-direction:column;gap:4px}
.invest-row{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:.7rem 1rem;display:flex;align-items:center;gap:.75rem}
.invest-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.ibuy{background:rgba(240,64,96,.12);color:var(--red)}.isell{background:rgba(0,200,150,.12);color:var(--green)}.ifee{background:rgba(90,102,128,.12);color:var(--muted2)}
.invest-info{flex:1;min-width:0}
.invest-desc{font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.invest-date{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
/* TX */
.tx-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:.85rem;flex-wrap:wrap}
.tx-title{font-size:.75rem;color:var(--muted2);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.search-wrap{position:relative;flex:1;min-width:140px;max-width:260px}
.search-wrap input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:7px 10px 7px 30px;border-radius:var(--r);font-size:.82rem;font-family:'Syne',sans-serif;outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--border2)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:1rem}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:5px 10px;border-radius:40px;font-size:.72rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-btn.active{background:var(--s3);border-color:var(--border2);color:var(--text)}
.tx-list{display:flex;flex-direction:column;gap:3px}
.tx-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;cursor:default;transition:background .15s}
.tx-item:hover{background:var(--s2)}.tx-item.expanded{background:var(--s2)}
.tx-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.tx-date{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace}
.tx-cat-badge{font-size:.62rem;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--s3);color:var(--muted2);letter-spacing:.04em;text-transform:uppercase}
.tx-amount{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500;text-align:right;flex-shrink:0}
.tx-amount.pos{color:var(--green)}.tx-amount.neg{color:var(--red)}
.tx-bal{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;text-align:right;margin-top:2px}
.tx-detail{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace;padding:.5rem 1rem .75rem calc(1rem + 36px + .75rem);display:none;line-height:1.7;word-break:break-all}
.tx-item.expanded+.tx-detail{display:block}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.empty-title{font-size:1rem;font-weight:700;margin-bottom:.4rem;color:var(--muted2)}
.empty-sub{font-size:.82rem;line-height:1.5}
.no-results{text-align:center;padding:2rem;color:var(--muted);font-size:.85rem}
.load-more-btn{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:.7rem;border-radius:var(--r);font-size:.8rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;margin-top:6px;transition:all .2s}
.load-more-btn:hover{background:var(--s3);color:var(--text)}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--gold);color:#0a0600;border:none;border-radius:50px;padding:.75rem 1.25rem;font-size:.88rem;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;display:flex;align-items:center;gap:.5rem;box-shadow:0 4px 24px rgba(232,160,32,.35);z-index:200;transition:all .2s}
.fab:hover{background:var(--gold2);transform:translateY(-2px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:1.5rem;width:100%;max-width:440px;transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:1rem;font-weight:800}
.modal-close{background:var(--s3);border:1px solid var(--border);color:var(--muted2);width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r2);padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--gold);background:rgba(232,160,32,.06)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.drop-icon{font-size:2rem;margin-bottom:.75rem;opacity:.7}
.drop-title{font-size:.9rem;font-weight:700;margin-bottom:.3rem}
.drop-sub{font-size:.78rem;color:var(--muted2)}
.modal-info{margin-top:1rem;font-size:.78rem;color:var(--muted);line-height:1.6;background:var(--s2);border-radius:var(--r);padding:.75rem}
.progress-wrap{margin-top:1rem;display:none}
.progress-bar{height:4px;background:var(--s3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;width:0;transition:width .3s}
.progress-label{font-size:.75rem;color:var(--muted2);margin-top:.4rem}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:.6rem 1.2rem;border-radius:40px;font-size:.8rem;font-weight:600;z-index:400;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ci-market{background:rgba(34,197,94,.12);color:#4ade80}.ci-food{background:rgba(249,115,22,.12);color:#fb923c}.ci-cafe{background:rgba(168,85,247,.12);color:#c084fc}.ci-tin{background:rgba(0,200,150,.12);color:#00c896}.ci-tout{background:rgba(240,64,96,.12);color:#f04060}.ci-sub{background:rgba(64,128,255,.12);color:#60a0ff}.ci-transit{background:rgba(6,182,212,.12);color:#22d3ee}.ci-gold{background:rgba(232,160,32,.12);color:#e8a020}.ci-bill{background:rgba(100,116,139,.12);color:#94a3b8}.ci-scooter{background:rgba(236,72,153,.12);color:#f472b6}.ci-atm{background:rgba(148,163,184,.12);color:#94a3b8}.ci-iade{background:rgba(16,185,129,.12);color:#34d399}.ci-award{background:rgba(251,191,36,.12);color:#fbbf24}.ci-fun{background:rgba(139,92,246,.12);color:#a78bfa}.ci-fuel{background:rgba(239,68,68,.12);color:#f87171}.ci-other{background:rgba(90,102,128,.12);color:#5a6680}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
</style>
</head>
<body>
<header>
  <div class="logo">para<span>takip</span></div>
  <div class="header-actions">
    <div class="sync-dot" id="syncDot"></div>
    <button class="icon-btn" onclick="syncData()" title="Senkronize et">⟳</button>
    <button class="icon-btn" onclick="exportJSON()" title="Dışa aktar">↓</button>
  </div>
</header>
<main>
  <!-- TAB BAR -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" onclick="setTab('overview')"><span class="tab-icon">📊</span>Özet</button>
    <button class="tab-btn" onclick="setTab('analysis')"><span class="tab-icon">📈</span>Analiz</button>
    <button class="tab-btn" onclick="setTab('invest')"><span class="tab-icon">🥇</span>Altın & Döviz</button>
  </div>

  <div class="period-bar" id="periodBar"></div>
  <div class="cards" id="summaryCards"></div>

  <!-- OVERVIEW (NORMAL) VIEW -->
  <div id="normalView">
    <div class="charts">
      <div class="chart-box">
        <div class="chart-title">Kategori Dağılımı</div>
        <div class="chart-wrap"><canvas id="catChart"></canvas></div>
        <div class="cat-legend" id="catLegend"></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">Günlük Harcama</div>
        <div class="chart-wrap"><canvas id="dayChart"></canvas></div>
      </div>
    </div>
    <div class="tx-header">
      <div class="tx-title">İşlemler</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Ara..." oninput="renderTx()">
      </div>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="tx-list" id="txList"></div>
  </div>

  <!-- ANALYSIS VIEW -->
  <div class="analysis-view" id="analysisView">
    <div class="analysis-controls" id="analysisControls"></div>
    <div class="analysis-summary" id="analysisSummary"></div>
    <div class="analysis-chart-box">
      <div class="chart-title" id="analysisChartTitle">Kategori Bazlı Harcama</div>
      <div class="analysis-chart-wrap"><canvas id="analysisChart"></canvas></div>
    </div>
    <div class="analysis-chart-box">
      <div class="chart-title" id="analysisCompareTitle">Karşılaştırma</div>
      <div class="analysis-chart-wrap"><canvas id="analysisCompareChart"></canvas></div>
    </div>
  </div>

  <!-- INVESTMENT VIEW -->
  <div class="invest-view" id="investView">
    <div class="invest-stats" id="investStats"></div>
    <div class="chart-box">
      <div class="chart-title">🥇 Altın &amp; Döviz İşlemleri</div>
      <div class="invest-list" id="investList"></div>
    </div>
  </div>

  <div style="height:5rem"></div>
</main>

<button class="fab" onclick="openModal()">📄 PDF Yükle</button>

<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Hesap Ekstresi Yükle</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="drop-zone" id="dropZone">
      <input type="file" accept=".pdf" id="fileInput" onchange="handleFile(event)">
      <div class="drop-icon">📄</div>
      <div class="drop-title">PDF'i buraya sürükle veya tıkla</div>
      <div class="drop-sub">Fibabanka hesap ekstresi destekleniyor</div>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">İşleniyor...</div>
    </div>
    <div class="modal-info">📌 PDF sadece tarayıcında işlenir, hiçbir sunucuya gönderilmez.</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVxxJBXLA1YNZdpBt5Vp-NTJNN_Araefk_GFUSQ0eFxoym5ffpE9FyI1bSOGrv62HNKA/exec';
// ============================================================

pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const CATS={
  'Market':         {icon:'🛒',cls:'ci-market', kw:['MIGROS','MIGROSONE','DIJITAL PLAT','MONEYPAY/MIGROS','MONEYPAY /MIGROS','MONEYPAY /DIJITAL','ANS GIDA','CANER MARKET']},
  'Yemek Sipariş':  {icon:'🍔',cls:'ci-food',   kw:['YEMEKSEPETI','TRENDYOLYEMEK','TRENDYOL YEMEK','S/TRENDYOL YEMEK','PARAM/TRENDYOL','GETIR','/GETIR']},
  'Kafe & Restoran':{icon:'☕',cls:'ci-cafe',   kw:['LOKANTA','PASTANE','COFFEE','CAFE','KAFE','KAHVE','SIMIT','TOSTCU','BUFE','GIRITLI','AKAT TICARET']},
  'Gelen Transfer': {icon:'💚',cls:'ci-tin',    kw:['GELEN FAST']},
  'Giden Transfer': {icon:'💸',cls:'ci-tout',   kw:['GİDEN FAST','GIDEN FAST']},
  'Abonelik':       {icon:'📱',cls:'ci-sub',    kw:['YOUTUBE','CLAUDE','WORKSPACE','SUBSCRIPTION','NETFLIX','SPOTIFY','APPLE','PAYCELL/FATURA']},
  'Ulaşım':         {icon:'🚌',cls:'ci-transit',kw:['KENTKART','OBILET','TURAS TURIZM','BATI ANTALYA TURIZ','CALHAN DINLENME']},
  'Altın & Döviz':  {icon:'🥇',cls:'ci-gold',  kw:['XAU','ALINAN DÖVİZ','ALINAN DOVIZ','KAMBIYO','SATILAN DÖV']},
  'Fatura':         {icon:'📄',cls:'ci-bill',   kw:['TURK.NET','AYDEM','KURUM FATURA','FATURA ODEME','AVEA COM']},
  'Scooter':        {icon:'🛴',cls:'ci-scooter',kw:['MARSSCOOTER','SCOOTER']},
  'ATM':            {icon:'🏧',cls:'ci-atm',    kw:['ATM PARA CEKME']},
  'İade':           {icon:'↩️',cls:'ci-iade',   kw:['İPTALİ','IADE İŞLEMİ','SATIŞ İADE']},
  'Ödül':           {icon:'🎁',cls:'ci-award',  kw:['KAMPANYASI ÖDÜLÜ','ÖDÜLÜ']},
  'Eğlence':        {icon:'🎮',cls:'ci-fun',    kw:['BOWLI','BOWLING','SINEMA','AVM ANTALYA']},
  'Akaryakıt':      {icon:'⛽',cls:'ci-fuel',   kw:['PETROL','AKARYAKIT','SHELL','OPET','TOTAL']},
  'Diğer':          {icon:'•', cls:'ci-other',  kw:[]},
};

// These categories are EXCLUDED from normal income/expense stats
const EXCL=['Gelen Transfer','Giden Transfer','Altın & Döviz'];
const COLORS=['#e8a020','#00c896','#f04060','#4080ff','#9060f0','#00d4ff','#ff6040','#60d060','#c0a000','#ff60a0','#80c0ff','#40e0a0'];

// Analysis category groups
const ANALYSIS_CATS=['Market','Yemek Sipariş','Kafe & Restoran','Eğlence','Abonelik','Ulaşım','Fatura','Scooter','Akaryakıt','ATM','Diğer'];
const ANALYSIS_COLORS={'Market':'#4ade80','Yemek Sipariş':'#fb923c','Kafe & Restoran':'#c084fc','Eğlence':'#a78bfa','Abonelik':'#60a0ff','Ulaşım':'#22d3ee','Fatura':'#94a3b8','Scooter':'#f472b6','Akaryakıt':'#f87171','ATM':'#94a3b8','Diğer':'#5a6680'};

let allTx=JSON.parse(localStorage.getItem('paratakip_tx')||'[]');
let period='all',filter='all',currentTab='overview',visible=40;
let catChart,dayChart,analysisChart,analysisCompareChart;
let analysisMode='day'; // day, week, month
let analysisCat='all'; // all or specific category

function cat(desc){
  const d=desc.toUpperCase();
  for(const[c,data]of Object.entries(CATS)){
    if(c==='Diğer')continue;
    if(data.kw.some(k=>d.includes(k)))return c;
  }
  return 'Diğer';
}

function fmt(n){return Math.abs(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';}

function byPeriod(){
  if(period==='all')return allTx;
  return allTx.filter(t=>{const[d,m,y]=t.date.split('.');return`${y}-${m}`===period;});
}

// ---- TAB BAR ----
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',
      (tab==='overview'&&i===0)||(tab==='analysis'&&i===1)||(tab==='invest'&&i===2));
  });
  renderPeriodBar();
  renderCards();
  document.getElementById('normalView').style.display=tab==='overview'?'block':'none';
  document.getElementById('analysisView').classList.toggle('show',tab==='analysis');
  document.getElementById('investView').classList.toggle('show',tab==='invest');
  if(tab==='overview')showNormal();
  else if(tab==='analysis')renderAnalysis();
  else if(tab==='invest')renderInvest();
}

// ---- PERIOD BAR ----
function renderPeriodBar(){
  const map={};
  for(const t of allTx){const[d,m,y]=t.date.split('.');const k=`${y}-${m}`;if(!map[k])map[k]=new Date(+y,+m-1,1).toLocaleDateString('tr-TR',{month:'long',year:'numeric'});}
  const periods=Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  let h=`<button class="period-btn ${period==='all'?'active':''}" onclick="setPeriod('all')">Tümü</button>`;
  for(const[k,l]of periods)h+=`<button class="period-btn ${period===k?'active':''}" onclick="setPeriod('${k}')">${l}</button>`;
  document.getElementById('periodBar').innerHTML=h;
}

function setPeriod(p){period=p;filter='all';visible=40;renderPeriodBar();renderCards();
  if(currentTab==='overview')showNormal();
  else if(currentTab==='analysis')renderAnalysis();
  else if(currentTab==='invest')renderInvest();
}

// ---- CARDS ----
function renderCards(){
  const tx=byPeriod();
  // FIX: Find the actual last balance by using the highest _order index (original PDF order)
  let last=0;
  if(tx.length){
    let lastTx=tx[tx.length-1];
    // Among all tx, find the one with the highest _order (last in bank statement)
    for(const t of tx){
      if((t._order||0)>(lastTx._order||0)) lastTx=t;
    }
    last=lastTx.balance;
  }

  if(currentTab==='invest'){
    const g=tx.filter(t=>t.category==='Altın & Döviz');
    const alim=g.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
    const sat=g.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
    const pl=sat-alim;
    document.getElementById('summaryCards').innerHTML=`
      <div class="card c-gold"><div class="card-label">Güncel Bakiye</div><div class="card-value neutral">${fmt(last)}</div><div class="card-sub">Dönem sonu</div></div>
      <div class="card c-red"><div class="card-label">Toplam Alım</div><div class="card-value negative">${fmt(alim)}</div><div class="card-sub">${g.filter(t=>t.amount<0).length} işlem</div></div>
      <div class="card c-green"><div class="card-label">Toplam Satım</div><div class="card-value positive">${fmt(sat)}</div><div class="card-sub">${g.filter(t=>t.amount>0).length} işlem</div></div>
      <div class="card ${pl>=0?'c-green':'c-red'}"><div class="card-label">Kar / Zarar</div><div class="card-value ${pl>=0?'positive':'negative'}">${pl>=0?'+':''}${fmt(pl)}</div><div class="card-sub">Net yatırım sonucu</div></div>`;
    return;
  }

  const sp=tx.filter(t=>t.amount<0&&!EXCL.includes(t.category));
  const inc=tx.filter(t=>t.amount>0&&!EXCL.includes(t.category));
  const spT=sp.reduce((s,t)=>s+Math.abs(t.amount),0);
  const incT=inc.reduce((s,t)=>s+t.amount,0);
  const net=incT-spT;
  document.getElementById('summaryCards').innerHTML=`
    <div class="card c-gold"><div class="card-label">Güncel Bakiye</div><div class="card-value neutral">${fmt(last)}</div><div class="card-sub">Dönem sonu · ${tx.length} işlem</div></div>
    <div class="card c-red"><div class="card-label">Harcama</div><div class="card-value negative">${fmt(spT)}</div><div class="card-sub">${sp.length} işlem (transfer/altın hariç)</div></div>
    <div class="card c-green"><div class="card-label">Gelir</div><div class="card-value positive">${fmt(incT)}</div><div class="card-sub">${inc.length} işlem (transfer/altın hariç)</div></div>
    <div class="card ${net>=0?'c-blue':'c-red'}"><div class="card-label">Net</div><div class="card-value ${net>=0?'positive':'negative'}">${net>=0?'+':''}${fmt(net)}</div><div class="card-sub">Gerçek gelir − harcama</div></div>`;
}

// ---- NORMAL VIEW ----
function showNormal(){
  renderCharts();renderTx();
}

function renderCharts(){
  const tx=byPeriod();
  const expenses=tx.filter(t=>t.amount<0&&!EXCL.includes(t.category));
  const cmap={};for(const t of expenses)cmap[t.category]=(cmap[t.category]||0)+Math.abs(t.amount);
  const sorted=Object.entries(cmap).sort((a,b)=>b[1]-a[1]).slice(0,9);
  const cols=COLORS.slice(0,sorted.length);
  document.getElementById('catLegend').innerHTML=sorted.map((e,i)=>`<div class="cat-legend-row"><div class="cat-dot" style="background:${cols[i]}"></div><div class="cat-name">${e[0]}</div><div class="cat-amt">${fmt(e[1])}</div></div>`).join('');
  if(catChart)catChart.destroy();
  if(sorted.length)catChart=new Chart(document.getElementById('catChart'),{type:'doughnut',data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:cols,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmt(ctx.raw)}}}}});
  // Day chart
  const dmap={};
  for(const t of tx){if(t.amount<0&&!EXCL.includes(t.category)){const k=t.date.substring(0,5);dmap[k]=(dmap[k]||0)+Math.abs(t.amount);}}
  const ds=Object.entries(dmap).sort((a,b)=>a[0].localeCompare(b[0]));
  if(dayChart)dayChart.destroy();
  if(ds.length)dayChart=new Chart(document.getElementById('dayChart'),{type:'bar',data:{labels:ds.map(e=>e[0]),datasets:[{data:ds.map(e=>e[1]),backgroundColor:'rgba(232,160,32,.6)',borderColor:'rgba(232,160,32,.9)',borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});
}

// ---- ANALYSIS VIEW ----
function renderAnalysis(){
  // Controls
  const cats=ANALYSIS_CATS.filter(c=>{
    return byPeriod().some(t=>t.category===c&&t.amount<0);
  });
  let h=`<span class="group-label">Dönem:</span>`;
  h+=`<button class="analysis-pill ${analysisMode==='day'?'active':''}" onclick="setAnalysisMode('day')">Günlük</button>`;
  h+=`<button class="analysis-pill ${analysisMode==='week'?'active':''}" onclick="setAnalysisMode('week')">Haftalık</button>`;
  h+=`<button class="analysis-pill ${analysisMode==='month'?'active':''}" onclick="setAnalysisMode('month')">Aylık</button>`;
  h+=`<span class="group-label" style="margin-left:8px">Kategori:</span>`;
  h+=`<button class="analysis-pill ${analysisCat==='all'?'active':''}" onclick="setAnalysisCat('all')">Tümü</button>`;
  for(const c of cats){
    const ico=CATS[c]?.icon||'•';
    h+=`<button class="analysis-pill ${analysisCat===c?'active':''}" onclick="setAnalysisCat('${c}')">${ico} ${c}</button>`;
  }
  document.getElementById('analysisControls').innerHTML=h;

  const tx=byPeriod().filter(t=>t.amount<0&&!EXCL.includes(t.category));
  const filtered=analysisCat==='all'?tx:tx.filter(t=>t.category===analysisCat);

  // Summary stats
  const total=filtered.reduce((s,t)=>s+Math.abs(t.amount),0);
  const count=filtered.length;
  const avg=count?total/count:0;
  const days=new Set(filtered.map(t=>t.date)).size;
  const dailyAvg=days?total/days:0;
  document.getElementById('analysisSummary').innerHTML=`
    <div class="analysis-stat"><div class="analysis-stat-label">Toplam</div><div class="analysis-stat-val" style="color:var(--red)">${fmt(total)}</div></div>
    <div class="analysis-stat"><div class="analysis-stat-label">İşlem Sayısı</div><div class="analysis-stat-val">${count}</div></div>
    <div class="analysis-stat"><div class="analysis-stat-label">Ortalama İşlem</div><div class="analysis-stat-val">${fmt(avg)}</div></div>
    <div class="analysis-stat"><div class="analysis-stat-label">Günlük Ortalama</div><div class="analysis-stat-val">${fmt(dailyAvg)}</div></div>`;

  // Main chart
  renderAnalysisMainChart(filtered);
  // Compare chart
  renderAnalysisCompareChart(tx);
}

function renderAnalysisMainChart(filtered){
  if(analysisChart)analysisChart.destroy();
  const el=document.getElementById('analysisChart');

  if(analysisMode==='day'){
    document.getElementById('analysisChartTitle').textContent='Günlük Harcama' + (analysisCat!=='all'?' — '+analysisCat:'');
    const dmap={};
    for(const t of filtered){const k=t.date.substring(0,5);dmap[k]=(dmap[k]||0)+Math.abs(t.amount);}
    const ds=Object.entries(dmap).sort((a,b)=>a[0].localeCompare(b[0]));
    if(!ds.length)return;
    analysisChart=new Chart(el,{type:'bar',data:{labels:ds.map(e=>e[0]),datasets:[{data:ds.map(e=>e[1]),backgroundColor:'rgba(232,160,32,.65)',borderColor:'rgba(232,160,32,.9)',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});
  }
  else if(analysisMode==='week'){
    document.getElementById('analysisChartTitle').textContent='Haftalık Harcama' + (analysisCat!=='all'?' — '+analysisCat:'');
    const wmap={};
    for(const t of filtered){
      const[d,m,y]=t.date.split('.');
      const dt=new Date(+y,+m-1,+d);
      const weekStart=new Date(dt);weekStart.setDate(dt.getDate()-dt.getDay()+1);
      const wk=weekStart.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
      wmap[wk]=(wmap[wk]||0)+Math.abs(t.amount);
    }
    const ds=Object.entries(wmap);
    if(!ds.length)return;
    analysisChart=new Chart(el,{type:'bar',data:{labels:ds.map(e=>e[0]),datasets:[{data:ds.map(e=>e[1]),backgroundColor:'rgba(0,200,150,.55)',borderColor:'rgba(0,200,150,.9)',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});
  }
  else if(analysisMode==='month'){
    document.getElementById('analysisChartTitle').textContent='Aylık Harcama' + (analysisCat!=='all'?' — '+analysisCat:'');
    const mmap={};
    for(const t of filtered){
      const[d,m,y]=t.date.split('.');
      const mk=new Date(+y,+m-1,1).toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
      mmap[mk]=(mmap[mk]||0)+Math.abs(t.amount);
    }
    const ds=Object.entries(mmap);
    if(!ds.length)return;
    analysisChart=new Chart(el,{type:'bar',data:{labels:ds.map(e=>e[0]),datasets:[{data:ds.map(e=>e[1]),backgroundColor:'rgba(64,128,255,.55)',borderColor:'rgba(64,128,255,.9)',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});
  }
}

function renderAnalysisCompareChart(allExpenses){
  if(analysisCompareChart)analysisCompareChart.destroy();
  const el=document.getElementById('analysisCompareChart');

  if(analysisMode==='day'){
    // Stacked bar: categories per day
    document.getElementById('analysisCompareTitle').textContent='Günlük Kategori Dağılımı';
    const days=new Set();const catData={};
    for(const t of allExpenses){
      const k=t.date.substring(0,5);days.add(k);
      if(!catData[t.category])catData[t.category]={};
      catData[t.category][k]=(catData[t.category][k]||0)+Math.abs(t.amount);
    }
    const sortedDays=[...days].sort();
    const datasets=Object.entries(catData).map(([cat,data])=>({
      label:cat,data:sortedDays.map(d=>data[d]||0),
      backgroundColor:ANALYSIS_COLORS[cat]||'#5a6680',borderRadius:2,borderWidth:0
    }));
    if(!sortedDays.length)return;
    analysisCompareChart=new Chart(el,{type:'bar',data:{labels:sortedDays,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#8090b0',font:{size:10,family:'Syne'},boxWidth:10,padding:8}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},scales:{x:{stacked:true,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:9}}},y:{stacked:true,grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}}}});
  }
  else if(analysisMode==='week'){
    // Pie: category breakdown for selected period
    document.getElementById('analysisCompareTitle').textContent='Kategori Payları';
    const cmap={};
    for(const t of allExpenses)cmap[t.category]=(cmap[t.category]||0)+Math.abs(t.amount);
    const sorted=Object.entries(cmap).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length)return;
    analysisCompareChart=new Chart(el,{type:'doughnut',data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:sorted.map(e=>ANALYSIS_COLORS[e[0]]||'#5a6680'),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:true,position:'bottom',labels:{color:'#8090b0',font:{size:10,family:'Syne'},boxWidth:10,padding:6}},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmt(ctx.raw)}}}}});
  }
  else if(analysisMode==='month'){
    // Horizontal bar: top categories
    document.getElementById('analysisCompareTitle').textContent='Kategori Sıralaması';
    const cmap={};
    for(const t of allExpenses)cmap[t.category]=(cmap[t.category]||0)+Math.abs(t.amount);
    const sorted=Object.entries(cmap).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length)return;
    analysisCompareChart=new Chart(el,{type:'bar',data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:sorted.map(e=>ANALYSIS_COLORS[e[0]]||'#5a6680'),borderRadius:4,borderWidth:0}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#5a6680',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}},y:{grid:{display:false},ticks:{color:'#8090b0',font:{size:11,family:'Syne'}}}}}});
  }
}

function setAnalysisMode(m){analysisMode=m;renderAnalysis();}
function setAnalysisCat(c){analysisCat=c;renderAnalysis();}

// ---- INVEST VIEW ----
function renderInvest(){
  const tx=byPeriod();
  const g=tx.filter(t=>t.category==='Altın & Döviz');
  if(!g.length){document.getElementById('investList').innerHTML='<div class="no-results">Bu dönemde altın/döviz işlemi yok</div>';return;}
  document.getElementById('investList').innerHTML=[...g].reverse().map(t=>{
    const isBuy=t.amount<0;
    const isFee=t.description.toUpperCase().includes('KAMBIYO')||t.description.toUpperCase().includes('TAHSİLAT');
    const cls=isFee?'ifee':isBuy?'ibuy':'isell';
    const icon=isFee?'💳':isBuy?'🛒':'💰';
    const label=isFee?'Komisyon':isBuy?'Alım':'Satım';
    const desc=t.description.length>60?t.description.substring(0,60)+'…':t.description;
    return`<div class="invest-row"><div class="invest-icon ${cls}">${icon}</div><div class="invest-info"><div class="invest-desc">${esc(desc)}</div><div class="invest-date">${t.date} · ${label}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500;color:${t.amount<0?'var(--red)':'var(--green)'}">${t.amount<0?'−':'+'}${fmt(t.amount)}</div><div style="font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace">${fmt(t.balance)}</div></div></div>`;
  }).join('');
}

// ---- FILTER ROW ----
function renderFilters(){
  const tx=byPeriod();
  const cats=[...new Set(tx.filter(t=>!EXCL.includes(t.category)).map(t=>t.category))].sort();
  let h=`<button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">Tümü</button><button class="filter-btn ${filter==='gelir'?'active':''}" onclick="setFilter('gelir')">💚 Gelir</button><button class="filter-btn ${filter==='gider'?'active':''}" onclick="setFilter('gider')">💸 Gider</button><button class="filter-btn ${filter==='transfer'?'active':''}" onclick="setFilter('transfer')">↕ Transfer</button>`;
  for(const c of cats){const ico=CATS[c]?.icon||'•';h+=`<button class="filter-btn ${filter===c?'active':''}" onclick="setFilter('${c}')">${ico} ${c}</button>`;}
  document.getElementById('filterRow').innerHTML=h;
}
function setFilter(f){filter=f;visible=40;renderFilters();renderTx();}

// ---- TRANSACTIONS ----
function renderTx(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  let tx=byPeriod();
  if(filter==='gelir')tx=tx.filter(t=>t.amount>0&&!['Gelen Transfer','Altın & Döviz'].includes(t.category));
  else if(filter==='gider')tx=tx.filter(t=>t.amount<0&&!['Giden Transfer','Altın & Döviz'].includes(t.category));
  else if(filter==='transfer')tx=tx.filter(t=>['Gelen Transfer','Giden Transfer'].includes(t.category));
  else if(filter!=='all')tx=tx.filter(t=>t.category===filter);
  if(search)tx=tx.filter(t=>t.description.toLowerCase().includes(search)||t.category.toLowerCase().includes(search));
  const rev=[...tx].reverse();const shown=rev.slice(0,visible);
  if(!shown.length){document.getElementById('txList').innerHTML=allTx.length?'<div class="no-results">Sonuç bulunamadı</div>':`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Henüz işlem yok</div><div class="empty-sub">PDF'ini yükleyerek başla</div></div>`;renderFilters();return;}
  const rows=shown.map(t=>{
    const cd=CATS[t.category]||CATS['Diğer'];const pos=t.amount>=0;
    return`<div class="tx-item" onclick="toggleD(this)"><div class="tx-icon ${cd.cls}">${cd.icon}</div><div class="tx-info"><div class="tx-desc">${esc(clean(t.description))}</div><div class="tx-meta"><span class="tx-date">${t.date}</span><span class="tx-cat-badge">${t.category}</span></div></div><div><div class="tx-amount ${pos?'pos':'neg'}">${pos?'+':''}${fmt(t.amount)}</div><div class="tx-bal">${fmt(t.balance)}</div></div></div><div class="tx-detail">${esc(t.description)}</div>`;
  }).join('');
  const extra=rev.length>visible?`<button class="load-more-btn" onclick="loadMore()">+ ${rev.length-visible} işlem daha</button>`:'';
  document.getElementById('txList').innerHTML=rows+extra;
  renderFilters();
}
function loadMore(){visible+=40;renderTx();}
function toggleD(el){el.classList.toggle('expanded');}

function clean(d){
  return d.replace(/YURT (ICI|DISI) POS SATIS KART NO:[\d\*]+ POS İŞYERİ ADI:/i,'')
    .replace(/İŞLEM TARİHİ:[\d ]+ PROVİZYON NO:[\d ]+ RRN:[\d ]+/gi,'')
    .replace(/GELEN FAST\. - GONDEREN :/i,'← ').replace(/GİDEN FAST\. ALICI:/i,'→ ')
    .replace(/- BANKAADI:[^\-]+-/g,'').replace(/FAST SORGU NO:[\d]+- ALICI IBAN:[\w]+/g,'')
    .replace(/KAYNAK :MOBIL - AÇIKLAMA :/g,'').replace(/\s+/g,' ').trim();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ---- FULL RENDER ----
function render(){
  renderPeriodBar();renderCards();
  if(currentTab==='overview')showNormal();
  else if(currentTab==='analysis')renderAnalysis();
  else if(currentTab==='invest')renderInvest();
}

// ---- PDF PARSING ----
async function extractText(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const items=[];
  for(let pn=1;pn<=pdf.numPages;pn++){
    const page=await pdf.getPage(pn);
    const content=await page.getTextContent();
    for(const item of content.items){
      if('str' in item&&item.str&&item.str.trim()){
        items.push({page:pn,y:item.transform[5],x:item.transform[4],str:item.str.trim()});
      }
    }
  }
  items.sort((a,b)=>{
    if(a.page!==b.page)return a.page-b.page;
    if(Math.abs(b.y-a.y)>2)return b.y-a.y;
    return a.x-b.x;
  });
  return items.map(i=>i.str).join(' ');
}

function parseTx(fullText){
  const dpRx=/(\d{2}\.\d{2}\.\d{4})\s+(\d{2}\.\d{2}\.\d{4})\s+/g;
  const pos=[];let m;
  while((m=dpRx.exec(fullText))!==null){
    const before=fullText.substring(Math.max(0,m.index-3),m.index).trim();
    if(before.endsWith('-'))continue;
    pos.push({index:m.index,cs:m.index+m[0].length,date:m[1],valor:m[2]});
  }
  const txs=[];
  for(let i=0;i<pos.length;i++){
    const chunk=fullText.substring(pos[i].cs,i+1<pos.length?pos[i+1].index:fullText.length);
    const nums=[...chunk.matchAll(/-?[\d,]+\.\d{2}(?![\d.])/g)];
    if(nums.length<2)continue;
    const amount=parseFloat(nums[nums.length-2][0].replace(/,/g,''));
    const balance=parseFloat(nums[nums.length-1][0].replace(/,/g,''));
    const desc=chunk.substring(0,nums[nums.length-2].index).replace(/\s+/g,' ').trim();
    if(!desc||desc.length<3)continue;
    if(['fibabanka','444 88 88','hesap ekstresi','müşteri numarası'].some(w=>desc.toLowerCase().includes(w)))continue;
    if(Math.abs(amount)>999999)continue;
    txs.push({
      id:`${pos[i].date}_${amount}_${Math.random().toString(36).substr(2,4)}`,
      date:pos[i].date,valor:pos[i].valor,description:desc,amount,balance,
      category:cat(desc),type:amount>=0?'gelir':'gider',
      // FIX: Store original parse order so we can find the true last transaction
      _order:i
    });
  }
  return txs;
}

// ---- FILE HANDLING ----
async function handleFile(e){const f=e.target.files[0];if(f)await processPDF(f);}

async function processPDF(file){
  const pw=document.getElementById('progressWrap');
  const pf=document.getElementById('progressFill');
  const pl=document.getElementById('progressLabel');
  pw.style.display='block';pf.style.width='10%';pl.textContent='PDF okunuyor...';
  try{
    pf.style.width='35%';
    const text=await extractText(file);
    pf.style.width='65%';pl.textContent='Ayrıştırılıyor...';
    const newTxs=parseTx(text);
    pf.style.width='80%';
    if(!newTxs.length){
      pl.textContent='❌ İşlem bulunamadı';
      console.error('Parse failed. Sample:',text.substring(0,500));
      toast('⚠️ İşlem bulunamadı — F12 > Konsol');
      return;
    }
    const keys=new Set(allTx.map(t=>`${t.date}_${t.amount}_${t.description.substring(0,15)}`));
    const fresh=newTxs.filter(t=>!keys.has(`${t.date}_${t.amount}_${t.description.substring(0,15)}`));
    // FIX: When merging, update _order for new items to continue from existing max
    const maxOrder=allTx.reduce((mx,t)=>Math.max(mx,t._order||0),0);
    fresh.forEach((t,i)=>t._order=maxOrder+1+i);
    // FIX: Sort by _order (original PDF order) instead of amount
    allTx=[...allTx,...fresh].sort((a,b)=>(a._order||0)-(b._order||0));
    saveLocal();pf.style.width='90%';pl.textContent='Kaydediliyor...';
    await syncToSheets();
    pf.style.width='100%';pl.textContent=`✅ ${fresh.length} yeni işlem eklendi`;
    setTimeout(()=>{closeModal();pw.style.display='none';pf.style.width='0%';document.getElementById('fileInput').value='';},1500);
    render();toast(`✅ ${fresh.length} yeni işlem eklendi`);
  }catch(err){pl.textContent='❌ '+err.message;toast('❌ Hata');console.error(err);}
}

function saveLocal(){localStorage.setItem('paratakip_tx',JSON.stringify(allTx));}

async function syncData(){
  setSync('syncing');
  try{
    if(APPS_SCRIPT_URL){
      const res=await fetch(APPS_SCRIPT_URL+'?action=read');
      const remote=await res.json();
      if(Array.isArray(remote)&&remote.length){
        const ids=new Set(allTx.map(t=>t.id));
        const fresh=remote.filter(t=>!ids.has(t.id));
        if(fresh.length){
          const maxOrder=allTx.reduce((mx,t)=>Math.max(mx,t._order||0),0);
          fresh.forEach((t,i)=>{if(!t._order)t._order=maxOrder+1+i;});
          allTx=[...allTx,...fresh].sort((a,b)=>(a._order||0)-(b._order||0));
          saveLocal();render();toast(`🔄 ${fresh.length} yeni`);
        }
        else toast('✅ Güncel');
      }
    }else toast('⚠️ URL yok');
    setSync('ok');
  }catch(e){setSync('error');toast('❌ Senkronizasyon hatası');}
}

async function syncToSheets(){
  if(!APPS_SCRIPT_URL)return;
  try{await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'bulk_add',transactions:allTx})});setSync('ok');}
  catch(e){setSync('error');}
}

function setSync(s){document.getElementById('syncDot').className='sync-dot '+s;}

function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(allTx,null,2)],{type:'application/json'}));
  a.download=`paratakip_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('📥 JSON indirildi');
}

function openModal(){document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('fileInput').click(),300);}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('progressWrap').style.display='none';document.getElementById('progressFill').style.width='0%';document.getElementById('fileInput').value='';}
function closeModalOut(e){if(e.target===document.getElementById('modal'))closeModal();}

const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')processPDF(f);});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ---- MIGRATION: Fix existing data without _order ----
(function migrateOrder(){
  if(allTx.length && allTx[0]._order===undefined){
    // Re-sort by date string then assign _order
    allTx.sort((a,b)=>{
      const da=a.date.split('.').reverse().join('');
      const db=b.date.split('.').reverse().join('');
      if(da!==db)return da.localeCompare(db);
      // For same date, sort by balance ascending (lower balance = later in day, but not reliable)
      // Best effort: use balance to infer chronological order within a day
      return a.balance-b.balance;
    });
    allTx.forEach((t,i)=>t._order=i);
    saveLocal();
  }
})();

// ---- INIT ----
setSync('ok');
render();
</script>
